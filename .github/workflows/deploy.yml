name: Enterprise OIDC Web App Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the build if needed

permissions:
  id-token: write # CRITICAL: Allows GitHub to request a secure token from Azure
  contents: read  # Allows GitHub to read your repository code files

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your code onto the temporary GitHub runner server
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up the correct Node.js runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Log into Azure securely using OIDC (No passwords!)
      - name: Az CLI Login via OIDC Trust
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step 4: Deploy the application files straight into your Azure Web App container
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: '06-enterprise-webapp-3mtt' # <--- CHANGE THIS VALUE!
